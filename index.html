<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solar System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="scene">
    <div class="sun"></div>

    <div class="orbit mercury-orbit"></div>
    <div class="planet-wrapper mercury-wrapper">
      <div class="planet mercury"></div>
      <span class="label">MERCURY</span>
    </div>

    <div class="orbit venus-orbit"></div>
    <div class="planet-wrapper venus-wrapper">
      <div class="planet venus"></div>
      <span class="label">VENUS</span>
    </div>

    <div class="orbit earth-orbit"></div>
    <div class="planet-wrapper earth-wrapper">
      <div class="planet earth"></div>
      <span class="label">EARTH</span>
      <div class="moon"></div>
      <span class="label moon-label">MOON</span>
    </div>

    <div class="orbit mars-orbit"></div>
    <div class="planet-wrapper mars-wrapper">
      <div class="planet mars"></div>
      <span class="label">MARS</span>
    </div>

    <div class="orbit jupiter-orbit"></div>
    <div class="planet-wrapper jupiter-wrapper">
      <div class="planet jupiter"></div>
      <span class="label">JUPITER</span>
    </div>

    <div class="orbit saturn-orbit"></div>
    <div class="planet-wrapper saturn-wrapper">
      <div class="planet saturn"></div>
      <span class="label">SATURN</span>
    </div>

    <div class="orbit uranus-orbit"></div>
    <div class="planet-wrapper uranus-wrapper">
      <div class="planet uranus"></div>
      <span class="label">URANUS</span>
    </div>

    <div class="orbit neptune-orbit"></div>
    <div class="planet-wrapper neptune-wrapper">
      <div class="planet neptune"></div>
      <span class="label">NEPTUNE</span>
    </div>

    <div class="orbit pluto-orbit"></div>
    <div class="planet-wrapper pluto-wrapper">
      <div class="planet pluto"></div>
      <span class="label">PLUTO</span>
    </div>
  </div>
</body>
</html>
